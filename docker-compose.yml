# =============================================================================
# docker-compose.yml — Orquestación del proyecto fullstack-dashboard
#
# Define y coordina los tres servicios principales del sistema:
#   - postgres : Base de datos PostgreSQL 16 (Alpine) para el Data Warehouse
#   - backend  : API Express con Node.js 20 (Alpine), ejecuta ETL y servidor
#   - frontend : Dashboard construido con Next.js (App Router) + TypeScript
#
# Dependencias:
#   backend  → postgres (espera healthcheck)
#   frontend → backend
# =============================================================================

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: olist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-olist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olist123}
      POSTGRES_DB: ${POSTGRES_DB:-olist_dw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olist} -d ${POSTGRES_DB:-olist_dw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: olist-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://olist:olist123@postgres:5432/olist_dw?schema=raw}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "npm run etl && npm run start",
      ]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
    container_name: olist-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3000}
    depends_on:
      - backend

volumes:
  pgdata:
